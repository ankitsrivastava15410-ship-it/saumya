<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgive me Saumya</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#dbeafe,#f8fafc);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:90%;
  max-width:350px;
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  position:relative;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:15px;
  font-weight:bold;
}

.yes{background:#2563eb;color:white}
.no{background:#eee;position:absolute}

/* simple chibi */
.chibi{
  font-size:50px;
  margin-bottom:10px;
}

/* floating */
.float{
  position:absolute;
  font-size:22px;
  animation:float 5s linear infinite;
}

@keyframes float{
  to{transform:translateY(-100vh)}
}
</style>
</head>

<body>

<div id="app"></div>

<audio id="music" loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const app = document.getElementById("app");
const music = document.getElementById("music");

// START PAGE
function start(){
music.volume=1;
music.play();

app.innerHTML = `
<div class="card">
  <div class="chibi">👩‍🦱</div>
  <h2>Forgive me Saumya</h2>

  <p>
Others are gud and u are stevia 😄  
sweeter than them but healthy and good for me 💙  
  </p>

  <button class="yes" onclick="yes()">Yes I forgive u</button>
  <button class="no" id="noBtn">I don't</button>
</div>
`;

const btn = document.getElementById("noBtn");

// moving button
btn.onmouseover = () => {
  const x = Math.random()*200 - 100;
  const y = Math.random()*200 - 100;
  btn.style.transform = `translate(${x}px,${y}px)`;
};

// if somehow clicked
btn.onclick = noPage;
}

// YES PAGE
function yes(){
app.innerHTML = `
<div class="card">
  <div class="chibi">😊</div>
  <h2>Thank you Saumya</h2>

  <p>
thankyou saumya u are the best friend i could ask for  
u are very important to me  
thanks for forgiving me  
I'll never do it again
  </p>
</div>
`;
celebrate();
}

// NO PAGE
function noPage(){
app.innerHTML = `
<div class="card">
  <div class="chibi">😔</div>
  <h2>Please</h2>

  <p>
u still have time choose correctly or i will lose my bestest friend  
pls forgive me u are my bestest friend
  </p>

  <button class="yes" onclick="yes()">Yes I forgive u</button>
  <button class="no2" onclick="finalNo()">I don't</button>
</div>
`;
}

// FINAL NO PAGE
function finalNo(){
app.innerHTML = `
<div class="card">
  <div class="chibi">😭</div>
  <h2>Option Denied</h2>

  <p>
plss na 😭  
tum mere saath pash gyi jindagi bhar ke liye  
u cant do anything about it
  </p>

  <button class="yes" onclick="yes()">Okay fine</button>
</div>
`;
}

// CELEBRATION
function celebrate(){
for(let i=0;i<20;i++){
  let e=document.createElement("div");
  e.className="float";
  e.innerText=Math.random()>0.5?"🎈":"✨";
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(3+Math.random()*3)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),6000);
}
}

start();
</script>

</body>
</html>
